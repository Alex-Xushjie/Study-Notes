
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wikijs
      # 💡 建议将下方的安全密码修改为你自己的专属密码
      POSTGRES_PASSWORD: wikijs_secure_password_2026
      POSTGRES_USER: wikijs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    volumes:
      # 数据的物理卷挂载在当前 Project_KB 目录下的 db_data 中，确保数据安全
      - ./db_data:/var/lib/postgresql/data
    restart: unless-stopped

  wiki:
    image: requarks/wiki:2
    depends_on:
      - db
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: wikijs
      # 💡 必须和上面 db 服务的 POSTGRES_PASSWORD 保持完全一致
      DB_PASS: wikijs_secure_password_2026          
      DB_NAME: wikijs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    ports:
      # 80 是虚拟机对外访问的网页端口（http://10.34.45.45）
      # 如果虚拟机的 80 端口已经被公司其他服务占用了，可以改成 "8080:3000"
      - "8080:3000"                                   
    volumes:
      # 知识库里的图片、上传的附件和拓扑图会保存在这里的 wiki_data 中
      - ./wiki_data:/wiki/data
    restart: unless-stopped